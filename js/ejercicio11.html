<!doctype html>

    <meta charset="UTF-8" />

<body>
    <script>
        const Calcularconsumo=()=>{
            const km =parseInt(prompt("ingrese kilometros recorrido"));
            const litros= parseInt(prompt("ingrese los litros consumidos"));
            const resultado = litros / km;
            document.write(`El consumo es de ${resultado} litros por kilómetro.`);

        }
        Calcularconsumo()
    </script>

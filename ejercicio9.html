<!doctype html>
<html lang="es"> 
<head>
    <meta charset="UTF-8" />
    <title>Ejercicio9</title>
</head>
<body>
    <script>
        // Ejercicio 9 - TP2
        // Consigna: Solicitar apellido y nombre al usuario y mostrar un mensaje de bienvenida 
        
        const LLamar=()=>{
            // Se solicita al ususario que ingrese su apellido y nombre por separado
        const apellido = prompt("Ingrese su apellido: ");
        const nombre = prompt("Ingrese su nombre: ");

        // Se muestra el mensaje de bienvenida 
        document.write(`¡Hola ${nombre} ${apellido}, bienvenido a Programación Visual!`); 
        }

        // Se llama a la funcion para ejecuarla
        LLamar();
    </script>
</body> 
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Programación Visual</title>
</head>
<body>
    <h1>Elementos del Arreglo</h1>

    <script>
        // 1. Definimos la función flecha que recibe el arreglo
        const mostrarArreglo = (arreglo) => {
            arreglo.forEach(num => {
                document.write(`<p>Número: ${num}</p>`);
            });
        };

        // 2. Lógica para solicitar datos al usuario
        const iniciarCarga = () => {
            const cantidad = parseInt(prompt("¿Cuántos números desea ingresar?"));
            let numeros = [];

            // Usamos un bucle para pedir los números de forma iterativa
            for (let i = 0; i < cantidad; i++) {
                let ingreso = Number(prompt(`Ingrese el número ${i + 1} de ${cantidad}:`));
                numeros.push(ingreso);
            }

            // 3. Llamamos a la función pasando el array cargado
            mostrarArreglo(numeros);
        };

        iniciarCarga();
    </script>
</body>
</html>

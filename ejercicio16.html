<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16</title>
</head>
<body>
    <script>
        // Ejercicio 16 - TP2
        // Consigna: Funcion sumaRango que recibe dos numeros enteros (inicio y fin)
        //y retorna la suma de todos los numeros en ese ranngo, incluyendolos.
        // El numero inicial debe ser menor o igual al final
        document.write("<h1>Sumar Números en un Rango</h1>");

        // Funcion flecha que recorre el rango con un for y acumula la suma
        const sumarRango = (inicio, fin) => {
            let suma = 0; // Acumulador que ira sumando cada numero del rango

            // El bucle va desde el numero inicial hasa el final
            for (let i = inicio; i <= fin; i++) {
                suma += i;
            }
            return suma; // Se retorna el total acumulado
        }

        // Se solicitan los dos numeros al usuario y se convierte a entero
        let inicio = parseInt(prompt("Ingrese el número de inicio:"));
        let fin = parseInt(prompt("Ingrese el número de fin:"));

        // Se valida que el inicio sea menor o igual al fin antes de operar
        if (inicio <= fin) {
            let resultado = sumarRango(inicio, fin);
            document.write(`La suma de los números desde ${inicio} hasta ${fin} es: ${resultado}.`);
        } else {
            // Si el inicio es mayor que el fin, se informa al usuario
            document.write("El número de inicio debe ser menor o igual al número de fin.");
        }
    </script>
</body>
</html>
